<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#1E90FF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="600" fill="url(#bg)"/>

  <!-- Water wave -->
  <path d="M0 400 Q300 300 600 400 T1200 400 L1200 600 L0 600 Z" fill="#1E90FF" opacity="0.6"/>

  <!-- Logo Text -->
  <text x="50%" y="250" text-anchor="middle" font-size="80" font-family="Arial, sans-serif" fill="#111">
    illusion Drips
  </text>

  <!-- Sub text -->
  <rect x="430" y="280" width="340" height="50" rx="8" fill="#0B5FA5"/>
  <text x="600" y="315" text-anchor="middle" font-size="28" fill="#fff" font-family="Arial">
    Mineral Water
  </text>

  <!-- Tagline -->
  <text x="600" y="360" text-anchor="middle" font-size="28" font-style="italic" fill="#222">
    "Stay Liquid"
  </text>

  <!-- Water drop -->
  <path d="M950 180 C920 230, 920 280, 950 320 C980 280, 980 230, 950 180 Z"
        fill="#4FC3F7" stroke="#0288D1" stroke-width="3"/>
</svg>
